stages:
  - test
  - build
  - deploy_staging
  - review
  - deploy_production

variables:
  NODE_VERSION: "20"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .npm/
    - .next/cache/

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:
  stage: test
  image: node:${NODE_VERSION}-alpine
  before_script:
    - npm ci
  script:
    - npm run lint
    - |
      if node -e "const s=require('./package.json').scripts||{}; process.exit(s.test?0:1)"; then
        npm run test
      else
        echo "No test script found in package.json; skipping unit tests."
      fi
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_ID

build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  before_script:
    - npm ci
  script:
    - npm run build
  artifacts:
    paths:
      - .next/
      - public/
    expire_in: 1 day
  needs:
    - test
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_ID

deploy_staging:
  stage: deploy_staging
  image: node:${NODE_VERSION}-alpine
  environment:
    name: staging
    url: https://staging.yourdomain.com
  script:
    - echo "Deploying to staging..."
    # Replace with your real staging deployment command(s)
  needs:
    - build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

review_production:
  stage: review
  script:
    - echo "Awaiting human review/approval before production deploy."
  needs:
    - deploy_staging
  when: manual
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy_production:
  stage: deploy_production
  image: node:${NODE_VERSION}-alpine
  environment:
    name: production
    url: https://yourdomain.com
  script:
    - echo "Deploying to production..."
    # Replace with your real production deployment command(s)
  needs:
    - review_production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
